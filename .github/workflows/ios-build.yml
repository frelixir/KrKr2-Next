name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build configuration
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios-build.yml'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'build/build_ios.sh'
      - 'apps/flutter_app/**'
      - 'bridge/**'
      - 'cpp/**'
      - 'cmake/**'
      - 'vcpkg/**'

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'release' }}
      CUBISM_SDK_URL: https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.4.1.zip
      HOMEBREW_NO_AUTO_UPDATE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          sw_vers
          xcodebuild -version
          flutter --version
          cmake --version

      - name: Ensure build tools are installed
        run: |
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          brew install ninja autoconf automake autoconf-archive libtool pkg-config bison
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Verify host build tools
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix)/bin:$PATH"
          command -v ninja
          command -v bison
          command -v autoreconf
          command -v automake
          command -v autoconf
          ninja --version
          bison --version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            apps/flutter_app/ios/Pods
          key: v2-${{ runner.os }}-pods-${{ hashFiles('apps/flutter_app/ios/Podfile.lock', 'apps/flutter_app/pubspec.lock', 'bridge/flutter_engine_bridge/ios/flutter_engine_bridge.podspec') }}
          restore-keys: |
            v2-${{ runner.os }}-pods-

      - name: Cache vcpkg build output
        uses: actions/cache@v4
        with:
          path: |
            .devtools/vcpkg
            out/ios
          key: v2-${{ runner.os }}-vcpkg-ios-${{ env.BUILD_TYPE }}-${{ hashFiles('vcpkg/**', 'CMakeLists.txt', 'CMakePresets.json', 'cpp/**', 'bridge/engine_api/**', 'build/build_ios.sh', '.github/workflows/ios-build.yml') }}
          restore-keys: |
            v2-${{ runner.os }}-vcpkg-ios-${{ env.BUILD_TYPE }}-
            v2-${{ runner.os }}-vcpkg-ios-

      - name: Cache Cubism SDK
        uses: actions/cache@v4
        with:
          path: |
            CubismSdkForNative-5-r.4.1.zip
            cpp/plugins/cubism/Framework
            cpp/plugins/cubism/Core/include
            cpp/plugins/cubism/Core/lib
          key: v1-${{ runner.os }}-cubism-5-r4.1

      - name: Install Cubism SDK
        run: |
          if [ ! -f CubismSdkForNative-5-r.4.1.zip ]; then
            curl -L "${CUBISM_SDK_URL}" -o CubismSdkForNative-5-r.4.1.zip
          fi
          python3 - <<'PY'
          import os
          from pathlib import Path
          import shutil
          import zipfile

          archive = Path("CubismSdkForNative-5-r.4.1.zip")
          target = Path("cpp/plugins/cubism")
          required_prefixes = ["Framework/", "Core/include/", "Core/lib/"]

          with zipfile.ZipFile(archive) as zf:
              sdk_root = None
              for name in zf.namelist():
                  for prefix in required_prefixes:
                      idx = name.find(prefix)
                      if idx != -1:
                          sdk_root = name[:idx]
                          break
                  if sdk_root:
                      break

              if not sdk_root:
                  raise SystemExit("Cubism SDK root not found in archive")

              for subdir in ("Framework", "Core"):
                  path = target / subdir
                  if path.exists():
                      shutil.rmtree(path)

              for prefix in required_prefixes:
                  full_prefix = f"{sdk_root}{prefix}"
                  for member in zf.infolist():
                      if not member.filename.startswith(full_prefix):
                          continue
                      relative = member.filename[len(sdk_root):]
                      if not relative:
                          continue
                      out_path = target / relative
                      if member.is_dir():
                          out_path.mkdir(parents=True, exist_ok=True)
                          continue
                      out_path.parent.mkdir(parents=True, exist_ok=True)
                      with zf.open(member, "r") as src, open(out_path, "wb") as dst:
                          shutil.copyfileobj(src, dst)
                      mode = (member.external_attr >> 16) & 0o777
                      if mode:
                          os.chmod(out_path, mode)

          required = [
              target / "Framework/src/CubismFramework.hpp",
              target / "Core/include/Live2DCubismCore.h",
              target / "Core/lib/ios/Release-iphoneos/libLive2DCubismCore.a",
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit("Cubism extraction incomplete: " + ", ".join(missing))

          framework_root = target / "Framework"
          framework_src = framework_root / "src"

          # Project CMake adds only cpp/plugins/cubism/Framework to include paths,
          # while the official SDK keeps public headers and subdirectories under
          # Framework/src. Mirror src entries into Framework so existing include
          # directives resolve without changing repository sources.
          for item in framework_src.iterdir():
              link_path = framework_root / item.name
              if link_path.exists() or link_path.is_symlink():
                  continue
              try:
                  os.symlink(item.name if item.parent == framework_root else f"src/{item.name}", link_path)
              except OSError:
                  if item.is_dir():
                      shutil.copytree(item, link_path)
                  else:
                      shutil.copy2(item, link_path)

          print(f"Cubism SDK installed into {target}")
          PY

      - name: Build unsigned iOS app
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix)/bin:$PATH"
          chmod +x build/build_ios.sh
          ./build/build_ios.sh "${BUILD_TYPE}"

      - name: Archive build artifacts
        run: |
          mkdir -p artifacts
          cp -R apps/flutter_app/build/ios/iphoneos/Runner.app "artifacts/Runner-${BUILD_TYPE}.app"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-${{ env.BUILD_TYPE }}
          path: artifacts/Runner-${{ env.BUILD_TYPE }}.app
          if-no-files-found: error
          retention-days: 14
